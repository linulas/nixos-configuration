exec-once = waybar & hyprpaper

windowrule = workspace 2, class:^(.*Spotify.*)$
windowrule = workspace 4, class:^(.*teams-for-linux.*)$
windowrule = workspace 4, class:^(.*Slack.*)$

bind = $secondaryMod, Q, exec, $browser https://www.figma.com/design/HyKNX9P1LP4hNrZ5DSvH2g/Openaid---Final-Design?node-id=8319-18203&t=JZipHFPrmyPEsKUL-1&fuid=768056389549170856 && ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, W, exec, $browser monkeytype.com && ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, E, exec, $browser github.com && ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, R, exec, $browser tasks.google.com && ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, T, exec, $browser search.nixos.org/packages?channel=25.11 && ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, A, exec, ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, S, exec, ~/.config/hypr/run_or_focus_application.sh Spotify spotify
bind = $secondaryMod, F, exec, ~/.config/hypr/run_or_focus_application.sh $terminal
bind = $secondaryMod, G, exec, ~/.config/hypr/run_or_focus_application.sh $fileManager
bind = $secondaryMod, Z, exec, ~/.config/hypr/run_or_focus_application.sh teams-for-linux
bind = $secondaryMod, X, exec, ~/.config/hypr/run_or_focus_application.sh Slack slack
bind = $secondaryMod, C, exec, $browser outlook.office.com/mail/ && ~/.config/hypr/run_or_focus_application.sh zen
bind = $secondaryMod, V, exec, ~/.config/hypr/run_or_focus_application.sh obsidian
bind = $secondaryMod, B, exec, ~/.config/hypr/run_or_focus_application.sh bruno
